<!DOCTYPE html>
<html>
  <head>
    <title>ChatBot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Chatbot Tài Liệu</h1>
    <input type="file" id="fileInput" />
    <button onclick="upload()">Upload</button>
    <button onclick="summarize()">Tóm tắt</button>
    <p id="summary"></p>
    <input type="text" id="question" placeholder="Hỏi gì đó..." />
    <button onclick="ask()">Hỏi</button>
    <p id="answer"></p>
    <script src="script.js"></script>
  </body>
</html>
