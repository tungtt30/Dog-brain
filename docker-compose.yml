version: "3.8"

services:
  backend:
    build: ./backend
    container_name: chatbot-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: nginx:alpine
    container_name: chatbot-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
